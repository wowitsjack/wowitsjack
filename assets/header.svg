<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');

      .bg { fill: #FFFFFF; }

      .title {
        font-family: 'Press Start 2P', 'Courier New', monospace;
        font-size: 48px;
        fill: #24292F;
        filter: drop-shadow(0 0 6px #24292F30);
      }

      .subtitle {
        font-family: 'Press Start 2P', 'Courier New', monospace;
        font-size: 10px;
        fill: #0969DA;
        filter: drop-shadow(0 0 4px #0969DA40);
      }

      .cursor {
        font-family: 'Press Start 2P', 'Courier New', monospace;
        font-size: 48px;
        fill: #24292F;
        animation: blink 1s step-end infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* scanline overlay */
      .scanlines {
        fill: url(#scanline-pattern);
        opacity: 0.03;
        animation: scanmove 8s linear infinite;
      }

      @keyframes scanmove {
        0% { transform: translateY(0); }
        100% { transform: translateY(4px); }
      }

      /* pixel grid dots */
      .pixel-grid {
        fill: url(#pixel-dot);
        opacity: 0.02;
      }

      /* subtle glow pulse on title */
      .glow-pulse {
        animation: gpulse 3s ease-in-out infinite;
      }

      @keyframes gpulse {
        0%, 100% { filter: drop-shadow(0 0 6px #24292F30); }
        50% { filter: drop-shadow(0 0 14px #0969DA40) drop-shadow(0 0 30px #0969DA20); }
      }

      /* floating pixel particles */
      .particle {
        fill: #0969DA;
        opacity: 0;
        animation: float 6s ease-in-out infinite;
      }
      .p1 { animation-delay: 0s; }
      .p2 { animation-delay: 1.2s; }
      .p3 { animation-delay: 2.4s; }
      .p4 { animation-delay: 0.6s; }
      .p5 { animation-delay: 1.8s; }
      .p6 { animation-delay: 3.0s; }
      .p7 { animation-delay: 3.6s; }
      .p8 { animation-delay: 4.2s; }

      @keyframes float {
        0% { opacity: 0; transform: translateY(0); }
        15% { opacity: 0.4; }
        85% { opacity: 0.4; }
        100% { opacity: 0; transform: translateY(-40px); }
      }

      /* border pixels */
      .border-px {
        fill: #D0D7DE;
        opacity: 0.6;
      }

      .border-px-accent {
        fill: #0969DA;
        opacity: 0.4;
      }

      /* corner decoration flicker */
      .corner-deco {
        fill: #24292F;
        animation: cornerflick 4s step-end infinite;
      }
      .corner-deco2 {
        fill: #0969DA;
        animation: cornerflick 4s step-end infinite;
        animation-delay: 2s;
      }

      @keyframes cornerflick {
        0%, 90%, 100% { opacity: 0.5; }
        92% { opacity: 0.1; }
        95% { opacity: 0.7; }
        97% { opacity: 0.2; }
      }

      /* version text */
      .version {
        font-family: 'Press Start 2P', 'Courier New', monospace;
        font-size: 8px;
        fill: #8B949E;
      }

      /* subtle outer border */
      .outer-border {
        fill: none;
        stroke: #D0D7DE;
        stroke-width: 1;
      }
    </style>

    <!-- scanline pattern -->
    <pattern id="scanline-pattern" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="#000000"/>
    </pattern>

    <!-- pixel dot pattern -->
    <pattern id="pixel-dot" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="#000000"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect class="bg" width="800" height="200" rx="6"/>
  <rect class="outer-border" width="800" height="200" rx="6"/>

  <!-- pixel border: top -->
  <rect class="border-px" x="8" y="8" width="4" height="4"/>
  <rect class="border-px" x="16" y="8" width="4" height="4"/>
  <rect class="border-px" x="24" y="8" width="60" height="4"/>
  <rect class="border-px-accent" x="88" y="8" width="4" height="4"/>
  <rect class="border-px" x="96" y="8" width="600" height="4"/>
  <rect class="border-px-accent" x="700" y="8" width="4" height="4"/>
  <rect class="border-px" x="708" y="8" width="60" height="4"/>
  <rect class="border-px" x="772" y="8" width="4" height="4"/>
  <rect class="border-px" x="780" y="8" width="4" height="4"/>
  <rect class="border-px" x="788" y="8" width="4" height="4"/>

  <!-- pixel border: bottom -->
  <rect class="border-px" x="8" y="188" width="4" height="4"/>
  <rect class="border-px" x="16" y="188" width="4" height="4"/>
  <rect class="border-px" x="24" y="188" width="60" height="4"/>
  <rect class="border-px-accent" x="88" y="188" width="4" height="4"/>
  <rect class="border-px" x="96" y="188" width="600" height="4"/>
  <rect class="border-px-accent" x="700" y="188" width="4" height="4"/>
  <rect class="border-px" x="708" y="188" width="60" height="4"/>
  <rect class="border-px" x="772" y="188" width="4" height="4"/>
  <rect class="border-px" x="780" y="188" width="4" height="4"/>
  <rect class="border-px" x="788" y="188" width="4" height="4"/>

  <!-- pixel border: left -->
  <rect class="border-px" x="8" y="16" width="4" height="168"/>

  <!-- pixel border: right -->
  <rect class="border-px" x="788" y="16" width="4" height="168"/>

  <!-- corner decorations -->
  <rect class="corner-deco" x="14" y="14" width="8" height="2"/>
  <rect class="corner-deco" x="14" y="14" width="2" height="8"/>
  <rect class="corner-deco2" x="778" y="14" width="8" height="2"/>
  <rect class="corner-deco2" x="784" y="14" width="2" height="8"/>
  <rect class="corner-deco2" x="14" y="184" width="8" height="2"/>
  <rect class="corner-deco" x="14" y="178" width="2" height="8"/>
  <rect class="corner-deco" x="778" y="184" width="8" height="2"/>
  <rect class="corner-deco2" x="784" y="178" width="2" height="8"/>

  <!-- floating particles -->
  <rect class="particle p1" x="120" y="160" width="3" height="3"/>
  <rect class="particle p2" x="250" y="170" width="2" height="2"/>
  <rect class="particle p3" x="400" y="155" width="3" height="3"/>
  <rect class="particle p4" x="550" y="165" width="2" height="2"/>
  <rect class="particle p5" x="680" y="150" width="3" height="3"/>
  <rect class="particle p6" x="180" y="145" width="2" height="2"/>
  <rect class="particle p7" x="470" y="175" width="2" height="2"/>
  <rect class="particle p8" x="620" y="140" width="3" height="3"/>

  <!-- main title -->
  <text class="title glow-pulse" x="400" y="95" text-anchor="middle" dominant-baseline="central">
    JACK
  </text>

  <!-- blinking cursor after title -->
  <text class="cursor" x="498" y="95" text-anchor="start" dominant-baseline="central">_</text>

  <!-- subtitle -->
  <text class="subtitle" x="400" y="140" text-anchor="middle">
    security researcher // hardware engineer
  </text>

  <!-- version flavor text -->
  <text class="version" x="770" y="178" text-anchor="end">v1.0.0</text>

  <!-- scanline overlay -->
  <rect class="scanlines" width="800" height="200" rx="6"/>

  <!-- pixel grid overlay -->
  <rect class="pixel-grid" width="800" height="200" rx="6"/>
</svg>
